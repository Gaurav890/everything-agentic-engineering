name: PR policy

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize, ready_for_review]
  merge_group:

permissions:
  contents: read

jobs:
  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate branch name
        if: github.event_name == 'pull_request'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: ./scripts/check-branch-name.sh "$BRANCH_NAME"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: ./scripts/check-pr-title.sh "$PR_TITLE"

      - name: Merge queue compatibility
        if: github.event_name == 'merge_group'
        run: echo "PR policy already validated on the pull request; reporting success for merge_group."
